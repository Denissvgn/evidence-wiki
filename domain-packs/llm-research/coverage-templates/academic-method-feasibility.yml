coverage_profile: academic-method-feasibility
required_facets:
  - facet_id: method-identity
    description: Confirm the named method, paper, or research artifact exists in a resolvable scholarly index.
    evidence_path: academic_method_existence
    source_policy: academic_indexed
    freshness_policy: publication_identity
    identity_policy: citation_id_resolves
    min_sources: 1
optional_facets:
  - facet_id: implementation-availability
    description: Identify a canonical implementation repository or release when implementation evidence is part of the answer.
    evidence_path: github_implementation
    source_policy: canonical_repository
    freshness_policy: release_snapshot
    identity_policy: repo_ref_resolves
    min_sources: 0
