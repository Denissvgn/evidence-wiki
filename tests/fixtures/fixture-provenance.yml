schema_version: "1.0"
policy:
  unmapped_fixture: validation_error
  uncertain_redistribution: remove_or_replace
  guessed_spdx_identifiers: forbidden

synthetic_defaults: &synthetic_defaults
  classification: synthetic
  source_work: Project-authored deterministic regression fixture
  origin_url: null
  created_at: 2026-07-11
  retrieved_at: null
  copyright_holder: EvidenceWiki contributors
  license: MIT
  license_url: LICENSE
  terms_url: LICENSE
  redistribution_permission: true
  attribution: See LICENSE and THIRD_PARTY_NOTICES.md.
  transformations: Purpose-built minimal data; no third-party prose or binary payload is included.

