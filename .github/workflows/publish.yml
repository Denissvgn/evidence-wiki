name: Publish release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Verify release and build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out the released tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the release environment
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install --editable ".[dev]"

      - name: Validate release identity
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          .venv/bin/python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          root = pathlib.Path.cwd()
          metadata = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          project = metadata["project"]
          version = project["version"]
          release_tag = os.environ["RELEASE_TAG"]
          expected_tag = f"v{version}"

          if project["name"] != "evidence-wiki":
              raise SystemExit(f"Unexpected project name: {project['name']!r}")
          if release_tag != expected_tag:
              raise SystemExit(f"Release tag {release_tag!r} must equal {expected_tag!r}")

          init_text = (root / "src/evidence_wiki/__init__.py").read_text(encoding="utf-8")
          version_match = re.search(r'^__version__\s*=\s*["\']([^"\']+)["\']\s*$', init_text, re.MULTILINE)
          if version_match is None:
              raise SystemExit("Could not find evidence_wiki.__version__")
          if version_match.group(1) != version:
              raise SystemExit(
                  f"Package version {version_match.group(1)!r} does not match pyproject version {version!r}"
              )

          changelog = (root / "CHANGELOG.md").read_text(encoding="utf-8")
          heading = re.compile(rf"^## {re.escape(version)} - \d{{4}}-\d{{2}}-\d{{2}}$", re.MULTILINE)
          if heading.search(changelog) is None:
              raise SystemExit(f"CHANGELOG.md has no dated heading for {version}")

          print(f"Validated release identity: evidence-wiki {version} ({release_tag})")
          PY

      - name: Run release gates
        shell: bash
        run: |
          .venv/bin/python -m pytest -q
          .venv/bin/python -m ruff check .
          .venv/bin/python tools/sync_vendored_scripts.py --check
          git diff --check

      - name: Build and inspect distributions
        shell: bash
        run: |
          .venv/bin/python -m build --sdist --wheel --no-isolation
          .venv/bin/python -m twine check --strict dist/*.whl dist/*.tar.gz

      - name: Smoke-test the built wheel
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install dist/*.whl
          .wheel-venv/bin/evidence-wiki --version
          smoke_root="$(mktemp -d)/provider-workspace"
          .wheel-venv/bin/evidence-wiki contract > /tmp/evidence-wiki-contract.json
          .wheel-venv/bin/evidence-wiki deploy \
            --target "$smoke_root" \
            --project-name provider-workspace \
            --project-description "Release wheel orchestration smoke" \
            --discovery-provider arxiv \
            --acquisition-provider arxiv
          .wheel-venv/bin/evidence-wiki orchestrate start \
            --target "$smoke_root" --orchestration-id wheel-smoke \
            --agent-id release-smoke --format json > /tmp/evidence-wiki-start.json
          .wheel-venv/bin/evidence-wiki orchestrate next \
            --target "$smoke_root" --orchestration-id wheel-smoke \
            --agent-id release-smoke --format json > /tmp/evidence-wiki-next.json
          .wheel-venv/bin/evidence-wiki orchestrate status \
            --target "$smoke_root" --orchestration-id wheel-smoke \
            --format json > /tmp/evidence-wiki-status.json
          .wheel-venv/bin/python - <<'PY'
          import os
          import evidence_wiki

          expected = os.environ["RELEASE_TAG"].removeprefix("v")
          if evidence_wiki.__version__ != expected:
              raise SystemExit(
                  f"Installed wheel version {evidence_wiki.__version__!r} does not match release version {expected!r}"
              )
          PY

      - name: Store verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish-to-pypi:
    name: Publish verified distributions to PyPI
    needs: release-gate
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/evidence-wiki
    permissions:
      id-token: write
    steps:
      - name: Retrieve verified distributions
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: python-package-distributions
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
