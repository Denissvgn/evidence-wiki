name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu / Python 3.10
            os: ubuntu-latest
            python-version: "3.10"
          - name: Ubuntu / Python 3.14
            os: ubuntu-latest
            python-version: "3.14"
          - name: macOS / Python 3.12
            os: macos-latest
            python-version: "3.12"
          - name: Windows / Python 3.12
            os: windows-latest
            python-version: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development environment (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install --editable ".[dev]"

      - name: Install development environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .venv
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe -m pip install --editable ".[dev]"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run tests and quality checks (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          .venv/bin/python -m pytest -q
          .venv/bin/python -m ruff check .
          .venv/bin/python tools/sync_vendored_scripts.py --check

      - name: Run tests and quality checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pytest -q
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe -m ruff check .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe tools\sync_vendored_scripts.py --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  package:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build environment
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install --editable ".[dev]"

      - name: Build and inspect wheel and sdist
        shell: bash
        run: |
          .venv/bin/python -m build --wheel --sdist --no-isolation
          .venv/bin/python -m twine check --strict dist/*.whl dist/*.tar.gz

      - name: Smoke-test installed wheel orchestration assets
        shell: bash
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install dist/*.whl
          smoke_root="$(mktemp -d)/provider-workspace"
          .wheel-venv/bin/evidence-wiki contract > /tmp/evidence-wiki-contract.json
          .wheel-venv/bin/evidence-wiki deploy \
            --target "$smoke_root" \
            --project-name provider-workspace \
            --project-description "Installed wheel orchestration smoke" \
            --discovery-provider arxiv \
            --acquisition-provider arxiv
          .wheel-venv/bin/evidence-wiki orchestrate start \
            --target "$smoke_root" \
            --orchestration-id wheel-smoke \
            --agent-id ci-smoke \
            --format json > /tmp/evidence-wiki-start.json
          .wheel-venv/bin/evidence-wiki orchestrate next \
            --target "$smoke_root" \
            --orchestration-id wheel-smoke \
            --agent-id ci-smoke \
            --format json > /tmp/evidence-wiki-next.json
          .wheel-venv/bin/evidence-wiki orchestrate status \
            --target "$smoke_root" \
            --orchestration-id wheel-smoke \
            --format json > /tmp/evidence-wiki-status.json
          .wheel-venv/bin/python - <<'PY'
          from importlib.metadata import version
          from pathlib import Path

          import evidence_wiki
          from evidence_wiki import resources
          from evidence_wiki.orchestration import ORCHESTRATION_RESULT_SCHEMA

          if evidence_wiki.__version__ != version("evidence-wiki"):
              raise SystemExit("Installed package metadata and module versions differ")
          installed_path = Path(evidence_wiki.__file__).resolve()
          if "site-packages" not in installed_path.parts:
              raise SystemExit(f"EvidenceWiki was not imported from the installed wheel: {installed_path}")

          properties = ORCHESTRATION_RESULT_SCHEMA["properties"]
          if properties["schema_version"] != {"type": "string", "enum": ["1.0"]}:
              raise SystemExit("Installed wheel contains an incompatible orchestration result schema")
          if any("type" not in definition for definition in properties.values()):
              raise SystemExit("Installed wheel result schema contains an untyped property")

          with resources.assets_root() as assets:
              required = (
                  "workspace-template/docs/orchestration.md",
                  "workspace-template/docs/orchestrator-handoff.md",
                  "workspace-template/docs/run-controller.md",
                  "workspace-template/skills/research-run.md",
                  "workspace-template/skills/research-discover.md",
                  "workspace-template/skills/research-acquire.md",
                  "workspace-template/skills/research-verify.md",
                  "orchestrator/skills/research-orchestrate.md",
              )
              missing = [relative for relative in required if not (assets / relative).is_file()]
              if missing:
                  raise SystemExit(f"Installed wheel is missing orchestration assets: {missing}")
          PY
          .wheel-venv/bin/python tools/smoke_installed_orchestration.py \
            --cli .wheel-venv/bin/evidence-wiki
